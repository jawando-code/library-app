<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="library.css">
</head>
<body>
    <div class='container'>
        
        <div class="masthead">
            <h1 class="header">library</h1>

        </div> 
        <div class="left-container">
            <p id="banner-msg">Ideas Change The World.</p>
             <p><button  id="show-dialog" ><img width="100" height="100" src="./Assets/icons/add.svg" alt="add-button"/><br>Add Book</button></p>
                <dialog id="book-dialog" >
                    <button type="cancel" id="cancel" value="Cancel" formnovalidate>X</button>

                    <form id="book-form" method="dialog">
                        <div class="field"> 
                            <label>Book title</label>
                            <input type="text" name="title" for="title" id="title"  required/>
                        </div>
                        <div class="field">
                            <label> Author </label>       
                            <input type="text" name="author"for="author" id="author"  required/>
                         </div>
                        <div class="field">
                            <label>Pages</label>
                            <input type="number" name="pages" for="page" id="pages"  required/>
                        </div>
                        <div class="field">
                            <label for="slider">read:</label>
                            <input type="checkbox" id="read">
                            
                            <div class="slider" data-checked="Yes" data-unchecked="No"></div>
                            
                        </div>
                    </form>
                   
                    <button type="submit" method="dialog" id="form-close" value="Add Book">
                        Add Book
                    </button>

                    
 
                </dialog>
                <p id="demo"></p>
            
            <div class="collection">
                <h2>collection</h2>
               
                
            </div>
        </div>
    </div>
    
    





    <script src="library.js" defer></script>
</body>
</html>
