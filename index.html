<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="library.css">
</head>
<body>
    <div class='container'>
        
        <div class="masthead">
            <h1 class="header">library</h1>

        </div> 
        <div class="left-container">
            
            <div>
                <p class="banner-msg">Ideas Change The World.</p>
                <p class="banner-msg" id="bookNumber">Books in library:&nbsp;<span id="booksIn"> </span></p>
                
            </div> <p><button  id="show-dialog" ><img width="100" height="100" src="./Assets/icons/add.svg" alt="add-button"/><br>New Book</button></p>
             
                <dialog id="book-dialog" >
                    <button type="cancel" id="cancel" value="Cancel" formnovalidate>X</button>

                    <form id="book-form" method="dialog">
                        <div class="field"> 
                            <label>Book title</label>
                            <input type="text" name="title" for="title" id="title"  required/>
                        </div>
                        <div class="field">
                            <label> Author </label>       
                            <input type="text" name="author"for="author" id="author"  required/>
                         </div>
                        <div class="field">
                            <label>Pages</label>
                            <input type="number" name="pages" for="page" id="pages"  required/>
                        </div>

                        
                        
                    
                    </form>
                   
                    <button type="submit" method="dialog" id="form-close" value="Add Book">
                        Add Book
                    </button>
                    

                    
 
                </dialog>
                <p id="demo"></p>
            
            <div class="collection">
                <h2>collection</h2>
               <div>
                    <label for="checkbox" class="switch">
                        <input type="checkbox" id="checkbox"/>
                        <div class="slider-wrapper">
                        <div class="slider-round"></div>
                    </label>
                </div>
                
                
            </div>
        </div>
    </div>
    
    





    <script src="library.js" defer></script>
</body>
</html>
